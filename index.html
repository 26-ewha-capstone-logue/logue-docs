<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logue - Project Description</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css"
  />
  <style>
    body {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
  </style>
</head>
<body class="markdown-body">
  <div id="content">Loading...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script>
    fetch("project-brief.md")
      .then((res) => {
        if (!res.ok) throw new Error("파일 로드 실패");
        return res.text();
      })
      .then((md) => {
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("content").innerHTML =
          "<p>project-brief.md 파일을 불러올 수 없습니다.</p>";
      });
  </script>
</body>
</html>
